baseURL = 'https://recoguides.com/'
languageCode = 'en-us'
title = 'RecoGuides - Micro-SaaS Tool Comparison'
theme = 'hello-friend-ng'
googleAnalytics = 'UA-XXXXXXX-X' # Placeholder - add actual GA ID later

[params]
  # Theme settings
  homeSubtitle = "Expert comparisons of the best Micro-SaaS tools for freelancers and teams"
  dateFormat = "January 2, 2006"
  description = "Independent, data-driven comparisons of Micro-SaaS tools. Find the best ClickUp, Monday.com, FreshBooks, and Asana alternatives."
  author = ["Etai Ocarn"]
  
  # Colors
  brandColor = "#3f51b5"
  accentColor = "#2196f3"
  
  # Features
  showReadingTime = true
  showShareButtons = true
  showPagination = true
  showRelatedPosts = true
  
  # Social
  email = "contact@recoguides.com"
  github = "https://github.com/etaio"
  twitter = "https://twitter.com/recoguides"
  linkedin = "https://linkedin.com/company/recoguides"
  
  # Affiliate disclosure
  affiliateDisclosure = "This site contains affiliate links. We earn commissions when you purchase through our links at no extra cost to you."
  
  # SEO
  metaRobots = "index, follow"
  
[outputs]
  home = ["HTML", "RSS", "JSON"]

[services]
  [services.googleAnalytics]
    id = "UA-XXXXXXX-X"

[taxonomies]
  category = "categories"
  tag = "tags"

