baseURL = 'https://recoguides.com/'
languageCode = 'en-us'
title = 'RecoGuides'
theme = 'PaperMod'
googleAnalytics = "G-JVSLQ905JV"

[pagination]
  pagerSize = 20

[params]
  env = "production"
  title = "RecoGuides"
  description = "Honest, data-driven comparisons to help you choose the right tools for your business."
  author = "Etai Ocarn"
  defaultTheme = "light"
  disableThemeToggle = true
  disableSpecial1stPost = true
  ShowReadingTime = true
  hideSummary = false
  ShowFullTextinRSS = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRelatedPosts = true
  RelatedPostsCount = 3
  ShowToc = false
  TocOpen = false
  comments = false
  hidemeta = false
  showtoc = true

  [params.label]
    text = "RecoGuides"

  [params.profileMode]
    enabled = false

  [params.assets]
    disableFingerprinting = true

[taxonomies]
  tag = "tags"
  vertical = "verticals"

[menu]
  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 10
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20
  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
